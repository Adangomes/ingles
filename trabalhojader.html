<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design System Lab - Escalas e Hierarquia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Playfair+Display:wght@700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --bg: #f8fafc;
            --white: #ffffff;
            --gray-200: #e2e8f0;
            --gray-500: #64748b;
            --gray-900: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--gray-900);
            padding: 20px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Painel de Controle lateral */
        .sidebar {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: bold; color: var(--gray-500); text-transform: uppercase; margin-bottom: 8px; }
        
        select, input { width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: 6px; background: #f1f5f9; }

        .btn-panic {
            width: 100%;
            padding: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Canvas de Visualização */
        .canvas {
            background: var(--white);
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 500px;
        }

        /* Escala de Cores (50-900) */
        .palette-container { display: flex; gap: 8px; margin-top: 30px; }
        .swatch { flex: 1; height: 40px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.05); position: relative; }
        .swatch::after { content: attr(data-label); font-size: 8px; position: absolute; bottom: -15px; left: 0; color: var(--gray-500); }

        /* Estilos de Texto (Modo Com Design) */
        .has-design .display { font-size: 56px; font-weight: 800; line-height: 1.1; margin-bottom: 15px; letter-spacing: -1.5px; }
        .has-design .headline { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .has-design .body-text { font-size: 16px; line-height: 1.6; color: var(--gray-500); margin-bottom: 25px; }
        .has-design .btn-preview { 
            padding: 14px 28px; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; display: inline-block;
        }

        /* MODO SEM DESIGN (Reseta tudo para o básico) */
        .no-design * {
            font-size: 16px !important;
            font-weight: 400 !important;
            color: #000 !important;
            background: none !important;
            margin: 0 !important;
            padding: 0 !important;
            display: block !important;
            font-family: serif !important;
            line-height: 1.2 !important;
            border: none !important;
            letter-spacing: normal !important;
        }
    </style>
</head>
<body>

<div class="main-grid">
    <aside class="sidebar">
        <h2 style="font-size: 1.2rem; margin-bottom: 20px;">Configurações</h2>
        
        <div class="control-group">
            <label>1. Produto (Paleta de Cores)</label>
            <select id="theme-select" onchange="updateUI()">
                <option value="fintech">Fintech (Azul Confiança)</option>
                <option value="saude">Saúde (Verde Equilíbrio)</option>
                <option value="luxo">Luxo (Nude/Dourado)</option>
            </select>
        </div>

        <div class="control-group">
            <label>2. Escala Tipográfica (Base)</label>
            <select id="scale-select" onchange="updateUI()">
                <option value="16">Padrão (16px)</option>
                <option value="18">Acessível (18px)</option>
            </select>
        </div>

        <div class="control-group">
            <label>3. Fonte (Personalidade)</label>
            <select id="font-select" onchange="updateUI()">
                <option value="'Inter'">Geometric Sans</option>
                <option value="'Playfair Display'">Classic Serif</option>
                <option value="'Roboto Mono'">Technical Mono</option>
            </select>
        </div>

        <button class="btn-panic" id="panic-btn" onclick="toggleDesign()">Remover Design</button>
    </aside>

    <main class="canvas has-design" id="preview-area">
        <div id="content-wrap">
            <h1 class="display" id="ui-title">Segurança em cada transação.</h1>
            <h2 class="headline" id="ui-subtitle">Sua fintech de confiança.</h2>
            <p class="body-text" id="ui-body">
                Este texto utiliza uma escala modular para garantir que a leitura seja fluida. 
                A cor primária define a ação principal, enquanto os tons neutros organizam a informação secundária.
            </p>
            <button class="btn-preview" id="ui-btn">Acessar Conta</button>

            <div style="margin-top: 50px;">
                <label>Escala de Cores Gerada (Tokens 50-900)</label>
                <div class="palette-container" id="color-palette">
                    </div>
            </div>
        </div>
    </main>
</div>

<script>
    const themes = {
        fintech: { primary: '#1e40af', title: 'Segurança em cada transação.', sub: 'Sua fintech de confiança.' },
        saude: { primary: '#059669', title: 'Respire fundo, viva melhor.', sub: 'Meditação e equilíbrio.' },
        luxo: { primary: '#b45309', title: 'Exclusividade em cada detalhe.', sub: 'Coleção Premium 2026.' }
    };

    let designActive = true;

    function updateUI() {
        if(!designActive) return;

        const theme = themes[document.getElementById('theme-select').value];
        const baseSize = document.getElementById('scale-select').value;
        const font = document.getElementById('font-select').value;

        // Atualizar Textos
        document.getElementById('ui-title').innerText = theme.title;
        document.getElementById('ui-subtitle').innerText = theme.sub;

        // Aplicar Estilos
        const area = document.getElementById('preview-area');
        area.style.fontFamily = font;
        
        document.getElementById('ui-title').style.color = theme.primary;
        document.getElementById('ui-btn').style.backgroundColor = theme.primary;
        document.getElementById('ui-btn').style.color = '#fff';

        // Atualizar Fonte Base
        document.getElementById('ui-body').style.fontSize = baseSize + 'px';

        // Gerar Paleta Visual (Tokens)
        const palette = document.getElementById('color-palette');
        palette.innerHTML = '';
        [50, 100, 300, 500, 700, 900].forEach(level => {
            const div = document.createElement('div');
            div.className = 'swatch';
            div.style.backgroundColor = theme.primary;
            div.style.opacity = level / 900;
            div.setAttribute('data-label', level);
            palette.appendChild(div);
        });
    }

    function toggleDesign() {
        const area = document.getElementById('preview-area');
        const btn = document.getElementById('panic-btn');
        
        if (designActive) {
            area.classList.replace('has-design', 'no-design');
            btn.innerText = "Restaurar Design System";
            btn.style.backgroundColor = "#10b981";
        } else {
            area.classList.replace('no-design', 'has-design');
            btn.innerText = "Remover Design";
            btn.style.backgroundColor = "#ef4444";
            updateUI();
        }
        designActive = !designActive;
    }

    // Inicializar
    updateUI();
</script>

</body>
</html>
