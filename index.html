<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Loja de Roupas</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { display: flex; height: 100vh; background: #f4f6f9; color: #333; }
    .sidebar { width: 220px; background: #2c3e50; color: #fff; display: flex; flex-direction: column; }
    .sidebar h2 { text-align: center; padding: 20px; border-bottom: 1px solid #444; }
    .sidebar button { background: none; border: none; color: #fff; padding: 15px; text-align: left; cursor: pointer; }
    .sidebar button:hover { background: #34495e; }
    .content { flex: 1; padding: 20px; overflow-y: auto; }
    h3 { margin-bottom: 15px; }
    form input, form select { margin: 5px; padding: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    table, th, td { border: 1px solid #ccc; }
    th, td { padding: 8px; text-align: center; }
    .badge { padding: 3px 8px; border-radius: 4px; color: #fff; font-size: 12px; }
    .low-stock { background: #e74c3c; }
    .ok-stock { background: #2ecc71; }
    .cart-summary { margin-top: 15px; }
    .btn { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 4px; }
    .btn-primary { background: #2980b9; color: #fff; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-success { background: #27ae60; color: #fff; }
</style>
</head>
<body>
<div class="sidebar">
    <h2>ERP Moda</h2>
    <button onclick="showSection('estoque')">Estoque / Produtos</button>
    <button onclick="showSection('pdv')">Frente de Caixa (PDV)</button>
    <button onclick="showSection('historico')">Histórico de Vendas</button>
</div>
<div class="content">
    <!-- ESTOQUE -->
    <div id="estoque" class="section">
        <h3>Cadastro de Produto</h3>
        <form id="formProduto">
            <input type="text" id="sku" placeholder="Código de Barras/SKU" required>
            <input type="text" id="descricao" placeholder="Descrição" required>
            <select id="tamanho">
                <option>P</option><option>M</option><option>G</option><option>GG</option><option>U</option>
            </select>
            <input type="text" id="cor" placeholder="Cor" required>
            <input type="number" id="preco" placeholder="Preço (R$)" required step="0.01">
            <input type="number" id="quantidade" placeholder="Quantidade" required>
            <button class="btn btn-primary" type="submit">Cadastrar</button>
        </form>
        <h3>Produtos em Estoque</h3>
        <table id="tabelaEstoque">
            <thead><tr><th>SKU</th><th>Descrição</th><th>Tamanho</th><th>Cor</th><th>Preço</th><th>Qtd</th><th>Status</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- PDV -->
    <div id="pdv" class="section" style="display:none;">
        <h3>Frente de Caixa</h3>
        <select id="produtoSelect"></select>
        <input type="number" id="qtdVenda" placeholder="Qtd" min="1" value="1">
        <button class="btn btn-primary" onclick="adicionarCarrinho()">Adicionar ao Carrinho</button>
        <h3>Carrinho</h3>
        <table id="tabelaCarrinho">
            <thead><tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Subtotal</th></tr></thead>
            <tbody></tbody>
        </table>
        <div class="cart-summary">
            <p><strong>Total: R$ <span id="totalVenda">0.00</span></strong></p>
            <select id="pagamento">
                <option>Cartão de Crédito</option>
                <option>Débito</option>
                <option>PIX</option>
                <option>Dinheiro</option>
            </select>
            <button class="btn btn-success" onclick="finalizarVenda()">Finalizar Venda</button>
        </div>
    </div>

    <!-- HISTÓRICO -->
    <div id="historico" class="section" style="display:none;">
        <h3>Histórico de Vendas</h3>
        <table id="tabelaHistorico">
            <thead><tr><th>ID Pedido</th><th>Data/Hora</th><th>Itens</th><th>Pagamento</th><th>Total</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
let vendas = JSON.parse(localStorage.getItem('vendas')) || [];
let carrinho = [];

function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => sec.style.display='none');
    document.getElementById(id).style.display='block';
    if(id==='estoque') renderEstoque();
    if(id==='pdv') atualizarSelectProdutos();
    if(id==='historico') renderHistorico();
}

document.getElementById('formProduto').addEventListener('submit', e => {
    e.preventDefault();
    let produto = {
        sku: document.getElementById('sku').value,
        descricao: document.getElementById('descricao').value,
        tamanho: document.getElementById('tamanho').value,
        cor: document.getElementById('cor').value,
        preco: parseFloat(document.getElementById('preco').value),
        quantidade: parseInt(document.getElementById('quantidade').value)
    };
    produtos.push(produto);
    localStorage.setItem('produtos', JSON.stringify(produtos));
    e.target.reset();
    renderEstoque();
    alert('Produto cadastrado com sucesso!');
});

function renderEstoque() {
    let tbody = document.querySelector('#tabelaEstoque tbody');
    tbody.innerHTML = '';
    produtos.forEach(p => {
        let status = p.quantidade <= 3 ? '<span class="badge low-stock">Baixo</span>' : '<span class="badge ok-stock">OK</span>';
        tbody.innerHTML += `<tr><td>${p.sku}</td><td>${p.descricao}</td><td>${p.tamanho}</td><td>${p.cor}</td><td>R$ ${p.preco.toFixed(2)}</td><td>${p.quantidade}</td><td>${status}</td></tr>`;
    });
}

function atualizarSelectProdutos() {
    let select = document.getElementById('produtoSelect');
    select.innerHTML = '';
    if(produtos.length === 0) {
        select.innerHTML = '<option value="">Nenhum produto cadastrado</option>';
        return;
    }
    produtos.forEach((p, i) => {
        select.innerHTML += `<option value="${i}">${p.descricao} - ${p.tamanho} - ${p.cor} (Estoque: ${p.quantidade})</option>`;
    });
}

function adicionarCarrinho() {
    let select = document.getElementById('produtoSelect');
    let idx = select.value;
    let qtdInput = document.getElementById('qtdVenda');
    let qtd = parseInt(qtdInput.value);
    
    if(idx === "" || isNaN(qtd) || qtd <= 0) {
        alert('Selecione um produto e uma quantidade válida!');
        return;
    }
    
    if(qtd > produtos[idx].quantidade) { 
        alert('Quantidade maior que o estoque disponível!'); 
        return; 
    }
    
    carrinho.push({ index: idx, produto: produtos[idx], qtd });
    renderCarrinho();
}

function renderCarrinho() {
    let tbody = document.querySelector('#tabelaCarrinho tbody');
    tbody.innerHTML = '';
    let total = 0;
    carrinho.forEach(item => {
        let subtotal = item.qtd * item.produto.preco;
        total += subtotal;
        tbody.innerHTML += `<tr><td>${item.produto.descricao} (${item.produto.tamanho}/${item.produto.cor})</td><td>${item.qtd}</td><td>R$ ${item.produto.preco.toFixed(2)}</td><td>R$ ${subtotal.toFixed(2)}</td></tr>`;
    });
    document.getElementById('totalVenda').innerText = total.toFixed(2);
}

function finalizarVenda() {
    if(carrinho.length === 0) { alert('Carrinho vazio!'); return; }
    
    let total = parseFloat(document.getElementById('totalVenda').innerText);
    let formaPagamento = document.getElementById('pagamento').value;
    let id = vendas.length + 1;
    let data = new Date().toLocaleString('pt-BR');
    let itens = carrinho.map(i => `${i.qtd}x ${i.produto.descricao}`).join(', ');
    
    // Abater do estoque
    carrinho.forEach(item => {
        produtos[item.index].quantidade -= item.qtd;
    });
    
    vendas.push({ id, data, itens, pagamento: formaPagamento, total });
    
    // Salvar no LocalStorage
    localStorage.setItem('produtos', JSON.stringify(produtos));
    localStorage.setItem('vendas', JSON.stringify(vendas));
    
    carrinho = [];
    renderCarrinho();
    atualizarSelectProdutos();
    alert('Venda realizada com sucesso!');
}

function renderHistorico() {
    let tbody = document.querySelector('#tabelaHistorico tbody');
    tbody.innerHTML = '';
    vendas.forEach(v => {
        tbody.innerHTML += `<tr><td>#${v.id}</td><td>${v.data}</td><td>${v.itens}</td><td>${v.pagamento}</td><td>R$ ${v.total.toFixed(2)}</td></tr>`;
    });
}

// Inicializar tela
renderEstoque();
</script>
</body>
</html>
