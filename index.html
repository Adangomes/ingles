<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET IT - LESSON 1 COMPLETE</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app {
            width: 90%;
            max-width: 420px;
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .logo {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #38bdf8;
        }

        .lesson-info {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .phrase {
            font-size: 22px;
            margin: 20px 0;
            min-height: 50px;
            font-weight: bold;
        }

        .pronunciation {
            color: #38bdf8;
            margin-top: 10px;
            font-size: 18px;
            font-style: italic;
        }

        .meaning {
            color: #94a3b8;
            margin-top: 10px;
            font-size: 17px;
        }

        .spoken {
            margin-top: 20px;
            font-size: 18px;
            color: #22c55e;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .listen { background: #2563eb; color: white; }
        .speak { background: #16a34a; color: white; }
        .next { background: #4f46e5; color: white; }

        .mic {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ef4444;
            margin: 20px auto;
            display: none;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1) }
            50% { transform: scale(1.2) }
            100% { transform: scale(1) }
        }
    </style>
</head>

<body>

    <div class="app">
        <div class="logo">GET IT</div>
        <div class="lesson-info" id="lesson-info">LESSON 1</div>

        <div class="phrase" id="phrase"></div>
        <div class="pronunciation" id="pronunciation"></div>
        <div class="meaning" id="meaning"></div>

        <button class="listen" onclick="hear()">Hear phrase</button>
        <button class="speak" onclick="listenUser()">Speak</button>

        <div class="mic" id="mic"></div>
        <div class="spoken" id="spoken"></div>

        <button class="next" onclick="next()">Next phrase</button>
    </div>

    <script>
        /* FRASES COMPLETAS DA LESSON 1 (PÁGINAS 1 A 9) */
        const lessons = [
            // Página 1 e 2
            { phrase: "Hello", pronunciation: "relôu", meaning: "Olá" },
            { phrase: "I am... I'm...", pronunciation: "ai ém... aim", meaning: "Eu sou / Eu estou" },
            { phrase: "You are... You're...", pronunciation: "iú ár... iór", meaning: "Você é / Você está" },
            { phrase: "Am I...? Yes, you're...", pronunciation: "ém ai? iés iór", meaning: "Eu sou...? Sim, você é..." },
            { phrase: "Are you...? Yes, I'm...", pronunciation: "ár iú? iés aim", meaning: "Você é...? Sim, eu sou..." },
            { phrase: "He is... He's... Jack", pronunciation: "ri iz... riz... djéc", meaning: "Ele é... Ele é (Jack)" },
            { phrase: "She is... She's... Anna", pronunciation: "shi iz... shiz... éna", meaning: "Ela é... Ela é (Anna)" },
            { phrase: "Is he Jack? Yes, he's Jack", pronunciation: "iz ri djéc? iés riz djéc", meaning: "Ele é o Jack? Sim, ele é o Jack" },
            { phrase: "Is she Anna? Yes, she's Anna", pronunciation: "iz shi éna? iés shiz éna", meaning: "Ela é a Anna? Sim, ela é a Anna" },
            
            // Página 3
            { phrase: "Pen, pencil, book, a", pronunciation: "pén, pênsil, búk, ei", meaning: "Caneta, lápis, livro, um/uma" },
            { phrase: "What is...? What's this?", pronunciation: "uót iz? uóts dhis", meaning: "O que é...? O que é isto?" },
            { phrase: "It is... It's...", pronunciation: "it iz... its", meaning: "Isto é / É" },
            { phrase: "What's this? It's a pen", pronunciation: "uóts dhis? its ei pén", meaning: "O que é isto? É uma caneta" },
            
            // Página 4
            { phrase: "Table, chair, light", pronunciation: "têibou, tchér, láit", meaning: "Mesa, cadeira, luz" },
            { phrase: "Wall, floor, room", pronunciation: "uól, flór, rúm", meaning: "Parede, chão, sala" },
            { phrase: "Ceiling, window, door", pronunciation: "sílin, uíndou, dór", meaning: "Teto, janela, porta" },
            { phrase: "Clock, box, picture", pronunciation: "clóc, bócs, píctchur", meaning: "Relógio, caixa, quadro" },
            { phrase: "Is this a pen? Yes, it's a pen", pronunciation: "iz dhis ei pén? iés its ei pén", meaning: "Isto é uma caneta? Sim, é uma caneta" },
            
            // Página 5
            { phrase: "No, it is not, it isn't", pronunciation: "nou, it iz nót, it izênt", meaning: "Não, não é" },
            { phrase: "Is this a pen? No, it isn't a pen; it's a pencil", pronunciation: "iz dhis ei pén? nou it izênt ei pén, its ei pênsil", meaning: "Isto é uma caneta? Não, é um lápis" },
            { phrase: "Long, short, the, contraction", pronunciation: "lóng, shórt, dê, contrécshun", meaning: "Longo, curto, o/a, contração" },
            { phrase: "Is the pen long? Yes, the pen's long", pronunciation: "iz dê pén lóng? iés dê pénz lóng", meaning: "A caneta é longa? Sim, a caneta é longa" },
            
            // Página 6 e 7
            { phrase: "Is the room short? No, the room isn't short; it's long", pronunciation: "iz dê rúm shórt? nou dê rúm izênt shórt, its lóng", meaning: "A sala é curta? Não, é longa" },
            { phrase: "Large, small", pronunciation: "lárdj, smól", meaning: "Grande, pequeno" },
            { phrase: "Is the table small? No, the table isn't small; it's large", pronunciation: "iz dê têibou smól? nou dê têibou izênt smól, its lárdj", meaning: "A mesa é pequena? Não, é grande" },
            { phrase: "City, town, village", pronunciation: "síti, táun, víledj", meaning: "Cidade grande, cidade, vila" },
            { phrase: "London is a city. Windsor is a town. Grantchester is a village", pronunciation: "lândon iz ei síti. uíndzor iz ei táun. gránt-tchéster iz ei víledj", meaning: "Londres é uma cidade..." },
            
            // Página 8
            { phrase: "Is the table long or short?", pronunciation: "iz dê têibou lóng ór shórt", meaning: "A mesa é longa ou curta?" },
            { phrase: "Man, woman, boy, girl", pronunciation: "mén, uúman, bói, guérl", meaning: "Homem, mulher, menino, menina" },
            { phrase: "Is he a man? Yes, he's a man", pronunciation: "iz ri ei mén? iés riz ei mén", meaning: "Ele é um homem? Sim, ele é um homem" },
            
            // Página 9
            { phrase: "Number: one, two, three, four, five", pronunciation: "nâmber: uán, tchu, thrí, fór, fáiv", meaning: "Número: 1, 2, 3, 4, 5" },
            { phrase: "What number's this? It's the number one", pronunciation: "uót nâmberz dhis? its dê nâmber uán", meaning: "Que número é este? É o número um" }
        ];

        let index = 0;

        function load() {
            document.getElementById("phrase").innerText = lessons[index].phrase;
            document.getElementById("pronunciation").innerText = "Pronúncia: " + lessons[index].pronunciation;
            document.getElementById("meaning").innerText = "Significado: " + lessons[index].meaning;
            document.getElementById("spoken").innerText = "";
            document.getElementById("lesson-info").innerText = "LESSON 1 - Item " + (index + 1) + "/" + lessons.length;
        }

        load();

        function hear() {
            let msg = new SpeechSynthesisUtterance(lessons[index].phrase);
            msg.lang = "en-GB"; // Sotaque britânico (comum no método Callan)
            speechSynthesis.speak(msg);
        }

        function listenUser() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Seu navegador não suporta reconhecimento de voz.");
                return;
            }

            const mic = document.getElementById("mic");
            const spoken = document.getElementById("spoken");
            spoken.innerText = "";
            mic.style.display = "block";

            const recognition = new SpeechRecognition();
            recognition.lang = "en-GB";
            recognition.start();

            recognition.onresult = function (event) {
                mic.style.display = "none";
                let text = event.results[0][0].transcript;
                spoken.innerText = "You said: " + text;
            };

            recognition.onerror = function () {
                mic.style.display = "none";
                spoken.innerText = "Erro ao ouvir...";
            };
        }

        function next() {
            index++;
            if (index >= lessons.length) {
                index = 0;
            }
            load();
        }
    </script>
</body>
</html>
